<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="heroHeader">
    <h1><img src="icons/icon48.png" alt="" /> CatFill</h1>
    <button id="settingsBtn" class="roundIcon" data-i18n-title="settingsTab">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" />
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2.05 2.05 0 0 1-2.9 2.9l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.05a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.88.34l-.04.04a2.05 2.05 0 0 1-2.9-2.9l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.05A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.88l-.04-.04a2.05 2.05 0 0 1 2.9-2.9l.04.04A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.05a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.88-.34l.04-.04a2.05 2.05 0 0 1 2.9 2.9l-.04.04A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.05A1.7 1.7 0 0 0 19.4 15Z" />
      </svg>
    </button>
  </header>

  <section class="profileSection">
    <div class="profileHeading">
      <span data-i18n="currentProfile">当前档案</span>
      <small id="profileMeta"></small>
    </div>
    <div class="profileRow">
      <select id="profileSelect"></select>
      <button id="addProfileBtn" class="squareIcon" data-i18n-title="profileNew">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
      </button>
      <button id="renameProfileBtn" class="squareIcon" data-i18n-title="profileRename">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16v4Z" /><path d="m13.5 6.5 4 4" /></svg>
      </button>
      <button id="deleteProfileBtn" class="squareIcon" data-i18n-title="profileDelete">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18" /><path d="M8 6V4h8v2" /><path d="M6 6l1 15h10l1-15" /><path d="M10 11v6M14 11v6" /></svg>
      </button>
    </div>
  </section>

  <section id="emptyProfile" class="emptyProfile hidden">
    <img src="icons/icon128.png" alt="" />
    <div>
      <h2 data-i18n="emptyProfileTitle">先准备一份资料</h2>
      <p data-i18n="emptyProfileHint">可以学习当前网页，或从文件导入。</p>
    </div>
    <button id="emptyImportBtn" class="textButton" type="button" data-i18n="importFromFile">从文件导入</button>
  </section>

  <section class="actionPanel">
    <button id="fillBtn" class="primaryAction">
      <span class="actionIcon">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z" /></svg>
      </span>
      <span><strong data-i18n="localFill">填写当前页面</strong><small data-i18n="fillHint">使用当前档案中的已保存资料</small></span>
      <svg class="actionArrow" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
    </button>
    <button id="scanBtn" class="secondaryAction">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h7l4 4v12H7V4Z" /><path d="M14 4v5h5" /><path d="M10 13h5M10 16h5" /></svg>
      <span><strong data-i18n="learnPage">学习并保存本页内容</strong><small data-i18n="learnHint">保存你已经填写的内容</small></span>
    </button>
    <div id="fillActivity" class="fillActivity hidden" role="status" aria-live="polite">
      <span class="writingCat" aria-hidden="true"></span>
      <strong id="fillActivityText"></strong>
    </div>
  </section>

  <section id="status" class="resultPanel hidden" aria-live="polite">
    <span class="resultIcon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></svg>
    </span>
    <div class="resultCopy"><strong id="statusTitle"></strong><small id="statusDetail"></small></div>
    <button id="aiFillBtn" class="resultAction hidden" type="button" data-i18n="aiContinue">用 AI 继续</button>
  </section>

  <section class="sidePanelSection">
    <button id="openSidePanelBtn" class="sidePanelPill">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10v16H7V4Z" /><path d="M10 8h4M10 12h4M10 16h3" /></svg>
      <span data-i18n="openOrganizer">管理我的资料</span>
      <span>›</span>
    </button>
  </section>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
