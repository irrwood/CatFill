<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CatFill payment</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f7f5; color: #20211f; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; }
    main { width: min(100%, 460px); padding: 40px; background: #fff; border: 1px solid #e5e7e2; border-radius: 8px; box-shadow: 0 18px 55px rgba(30, 35, 28, .09); }
    .mark { width: 52px; height: 52px; display: grid; place-items: center; margin-bottom: 28px; border-radius: 50%; background: #e9f7ee; color: #17733b; }
    .cancelled .mark { background: #f0f1ef; color: #5e625c; }
    svg { width: 27px; height: 27px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { margin: 0 0 10px; font-size: 25px; line-height: 1.25; letter-spacing: 0; }
    p { margin: 0; color: #62665f; font-size: 15px; line-height: 1.65; }
    .zh { margin-top: 18px; padding-top: 18px; border-top: 1px solid #eceee9; }
    .brand { margin-top: 30px; color: #858981; font-size: 13px; font-weight: 650; }
    @media (prefers-color-scheme: dark) {
      :root { background: #151715; color: #f0f2ed; }
      main { background: #202320; border-color: #353a34; box-shadow: none; }
      p { color: #b5bab2; }
      .zh { border-color: #353a34; }
      .brand { color: #969c93; }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark"><svg viewBox="0 0 24 24" aria-hidden="true"><path id="markPath" d="m5 12 4 4L19 6" /></svg></div>
    <h1 id="title">Payment received</h1>
    <p id="description">Your CatFill credits may take a moment to update. Return to the extension and refresh your balance.</p>
    <section class="zh">
      <h1 id="titleZh" lang="zh-CN">付款已收到</h1>
      <p id="descriptionZh" lang="zh-CN">CatFill 积分可能需要片刻更新。返回插件后刷新即可查看最新余额。</p>
    </section>
    <div class="brand">CatFill: AI Form Autofill</div>
  </main>
  <script>
    (() => {
      const cancelled = new URLSearchParams(location.search).get("status") !== "success";
      history.replaceState(null, "", location.pathname);
      if (!cancelled) return;
      document.querySelector("main").classList.add("cancelled");
      document.getElementById("markPath").setAttribute("d", "M6 6l12 12M18 6 6 18");
      document.getElementById("title").textContent = "Payment cancelled";
      document.getElementById("description").textContent = "No payment was made. You can return to CatFill whenever you are ready.";
      document.getElementById("titleZh").textContent = "已取消购买";
      document.getElementById("descriptionZh").textContent = "本次没有产生付款，你可以随时返回 CatFill。";
      document.title = "Payment cancelled - CatFill";
    })();
  </script>
</body>
</html>
